name: Server Auto-Update

on:
  schedule:
    - cron: '0 3 * * 0' # Every Sunday at 3am UTC
  workflow_dispatch:

jobs:
  update:
    name: Update server packages
    runs-on: ubuntu-latest

    steps:
      - name: Run apt upgrade on server
        uses: appleboy/ssh-action@v1.2.1
        id: upgrade
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo apt update -qq
            sudo apt upgrade -y -qq
            if [ -f /var/run/reboot-required ]; then
              echo "REBOOT_REQUIRED=true" >> /tmp/update_status
            else
              echo "REBOOT_REQUIRED=false" >> /tmp/update_status
            fi
            cat /tmp/update_status
            rm -f /tmp/update_status

      - name: Check reboot status
        id: reboot
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -f /var/run/reboot-required ]; then
              echo "true"
            else
              echo "false"
            fi

      - name: Notify Discord — no reboot needed
        if: success() && steps.reboot.outputs.stdout != 'true'
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🔧 Server Updated",
                "description": "Daily package update completed successfully.",
                "color": 5763719,
                "fields": [
                  {
                    "name": "Status",
                    "value": "✅ Packages upgraded — no reboot needed",
                    "inline": false
                  }
                ]
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_SERVER }}

      - name: Notify Discord — reboot required
        if: success() && steps.reboot.outputs.stdout == 'true'
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🔧 Server Updated",
                "description": "Daily package update completed successfully.",
                "color": 16776960,
                "fields": [
                  {
                    "name": "Status",
                    "value": "✅ Packages upgraded",
                    "inline": false
                  },
                  {
                    "name": "⚠️ Reboot Required",
                    "value": "SSH in and run `sudo reboot` when ready.",
                    "inline": false
                  }
                ]
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_SERVER }}

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "💥 Server Update Failed",
                "description": "Weekly package update encountered an error. Manual intervention required.",
                "color": 15548997,
                "fields": [
                  {
                    "name": "Action",
                    "value": "[View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                    "inline": false
                  }
                ]
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_SERVER }}