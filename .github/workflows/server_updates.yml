name: Server Auto-Update

on:
  schedule:
    - cron: '0 7 * * *' # Daily at 7am UTC
  workflow_dispatch:

jobs:
  update:
    name: Update server packages
    runs-on: ubuntu-latest

    steps:
      - name: Run apt upgrade on server
        uses: appleboy/ssh-action@v1.2.1
        id: upgrade
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "--- Starting package update ---"

            if ! sudo apt update -qq 2>&1; then
              echo "ERROR: apt update failed"
              exit 1
            fi

            UPGRADABLE=$(apt list --upgradable 2>/dev/null | grep -c upgradable || true)

            if [ "$UPGRADABLE" -le 1 ]; then
              echo "status=no-updates"
              exit 0
            fi

            echo "Packages to upgrade: $UPGRADABLE"

            if ! sudo apt upgrade -y -qq 2>&1; then
              echo "ERROR: apt upgrade failed"
              exit 1
            fi

            if [ -f /var/run/reboot-required ]; then
              echo "status=reboot-required"
            else
              echo "status=updated"
            fi

      - name: Parse update status
        id: status
        run: |
          OUTPUT="${{ steps.upgrade.outputs.stdout }}"
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "status=no-updates"; then
            echo "result=no-updates" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -q "status=reboot-required"; then
            echo "result=reboot-required" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -q "status=updated"; then
            echo "result=updated" >> $GITHUB_OUTPUT
          else
            echo "result=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Notify Discord — no updates
        if: success() && steps.status.outputs.result == 'no-updates'
        run: |
          curl -fsSL -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🟢 Server Check",
                "description": "Daily update check completed.",
                "color": 5763719,
                "fields": [
                  {
                    "name": "Status",
                    "value": "✅ No updates available",
                    "inline": false
                  }
                ]
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_SERVER }}

      - name: Notify Discord — updated, no reboot
        if: success() && steps.status.outputs.result == 'updated'
        run: |
          curl -fsSL -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🔧 Server Updated",
                "description": "Daily package update completed successfully.",
                "color": 5763719,
                "fields": [
                  {
                    "name": "Status",
                    "value": "✅ Packages upgraded — no reboot needed",
                    "inline": false
                  }
                ]
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_SERVER }}

      - name: Notify Discord — updated, reboot required
        if: success() && steps.status.outputs.result == 'reboot-required'
        run: |
          curl -fsSL -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🔧 Server Updated",
                "description": "Daily package update completed successfully.",
                "color": 16776960,
                "fields": [
                  {
                    "name": "Status",
                    "value": "✅ Packages upgraded",
                    "inline": false
                  },
                  {
                    "name": "⚠️ Reboot Required",
                    "value": "SSH in and run `sudo reboot` when ready.",
                    "inline": false
                  }
                ]
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_SERVER }}

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -fsSL -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "💥 Server Update Failed",
                "description": "Daily package update encountered an error. Manual intervention required.",
                "color": 15548997,
                "fields": [
                  {
                    "name": "Action",
                    "value": "[View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                    "inline": false
                  }
                ]
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_SERVER }}