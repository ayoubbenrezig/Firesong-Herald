name: Push Updates

on:
  push:
    branches-ignore:
      - main

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "⚡ Push to `${{ github.ref_name }}`",
                "color": 3447003,
                "fields": [
                  {
                    "name": "Author",
                    "value": "${{ github.event.head_commit.author.name }}",
                    "inline": true
                  },
                  {
                    "name": "Commit",
                    "value": "[`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})",
                    "inline": false
                  },
                  {
                    "name": "Message",
                    "value": "${{ github.event.head_commit.message }}",
                    "inline": false
                  }
                ]
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_PUSH }}